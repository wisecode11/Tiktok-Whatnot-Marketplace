<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seller Hub — Whatnot Connector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f7fc;
        --surface: #ffffff;
        --text: #1a1625;
        --text-muted: #6b6578;
        --border: #e8e4f0;
        --primary: #6d28d9;
        --primary-hover: #5b21b6;
        --primary-soft: #ede9fe;
        --accent: #8b5cf6;
        --success-bg: #ecfdf5;
        --success-border: #a7f3d0;
        --success-text: #047857;
        --error-bg: #fff1f2;
        --error-border: #fecdd3;
        --error-text: #be123c;
        --shadow-sm: 0 1px 2px rgba(26, 22, 37, 0.06);
        --shadow-md: 0 8px 24px rgba(109, 40, 217, 0.12);
        --radius: 12px;
        --radius-lg: 16px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 380px;
        min-height: 320px;
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg);
        -webkit-font-smoothing: antialiased;
      }

      .popup {
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }

      /* Header */
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px 18px 14px;
        background: #ffffff;
        border-bottom: 1px solid var(--border);
      }

      .brand-logo {
        display: block;
        width: 100%;
        max-width: 300px;
        height: auto;
        max-height: 58px;
        object-fit: contain;
        object-position: center;
      }

      .header-tagline {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.02em;
        text-align: center;
      }

      /* Body */
      .body {
        flex: 1;
        padding: 16px 18px 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* Status */
      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 11px 14px;
        border-radius: var(--radius);
        font-size: 0.8125rem;
        font-weight: 500;
        border: 1px solid transparent;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
      }

      .status::before {
        content: "";
        flex-shrink: 0;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.9;
        box-shadow: 0 0 0 3px currentColor;
        box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 25%, transparent);
      }

      .status .status-copy {
        flex: 1;
        color: inherit;
      }

      .status .status-copy span {
        font-weight: 400;
        opacity: 0.85;
        margin-right: 4px;
      }

      .status strong {
        font-weight: 600;
      }

      .status.connected {
        background: var(--success-bg);
        color: var(--success-text);
        border-color: var(--success-border);
      }

      .status.disconnected {
        background: var(--error-bg);
        color: var(--error-text);
        border-color: var(--error-border);
      }

      /* Card */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px;
        box-shadow: var(--shadow-sm);
      }

      .card-title {
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 4px;
      }

      .card-hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 12px;
        line-height: 1.45;
      }

      .field-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
        letter-spacing: 0.01em;
      }

      .input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 12px;
        font-family: inherit;
        font-size: 0.875rem;
        color: var(--text);
        background: var(--bg);
        transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      }

      .input::placeholder {
        color: #9ca3af;
      }

      .input:hover {
        border-color: #d4cfe0;
      }

      .input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--surface);
        box-shadow: 0 0 0 3px var(--primary-soft);
      }

      textarea.input {
        min-height: 90px;
        resize: vertical;
        font-family: ui-monospace, "Cascadia Code", monospace;
        font-size: 11px;
      }

      /* Button */
      .connect-btn {
        width: 100%;
        margin-top: 14px;
        border: 0;
        border-radius: 10px;
        padding: 12px 16px;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        box-shadow: var(--shadow-md);
        transition: transform 0.12s, box-shadow 0.15s, opacity 0.15s;
      }

      .connect-btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(109, 40, 217, 0.22);
      }

      .connect-btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .connect-btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
      }

      .copy-btn {
        background: #059669;
        color: #fff;
      }

      .api-btn {
        background: var(--primary);
        color: #fff;
      }

      /* Legacy / hidden demo blocks */
      .token-info {
        background: var(--bg);
        padding: 8px;
        border-radius: 8px;
        margin-top: 8px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        word-break: break-all;
      }

      #response {
        margin-top: 2px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 12px;
        max-height: 160px;
        overflow: auto;
        font-size: 11px;
        font-family: ui-monospace, "Cascadia Code", monospace;
        color: var(--text-muted);
        display: none;
        white-space: pre-wrap;
        line-height: 1.45;
      }

      .footer-note {
        text-align: center;
        font-size: 0.6875rem;
        color: var(--text-muted);
        padding-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <img
          class="brand-logo"
          src="seller-hub-logo.png"
          alt="Seller Hub Live"
          width="300"
          height="58"
        />
        <p class="header-tagline">Whatnot marketplace connector</p>
      </header>

      <main class="body">
        <div id="status" class="status disconnected" role="status" aria-live="polite">
          <div class="status-copy">
            <span>Status:</span>
            <strong id="status-text">Disconnected</strong>
          </div>
        </div>

        <section class="card" aria-labelledby="connect-heading">
          <h2 id="connect-heading" class="card-title">Link your account</h2>
          <p class="card-hint">
            Sign in on Whatnot, and enter your Liscense ID.
          </p>

          <label class="field-label" for="user-id-input">Liscense ID</label>
          <input
            id="user-id-input"
            class="input"
            type="text"
            placeholder="user_xxxxxxxxxxxxxxxx"
            autocomplete="off"
            spellcheck="false"
          />

          <button id="connect-btn" class="connect-btn" type="button">Connect Whatnot</button>
        </section>

        <!-- <button id="fetch-orders-btn" class="api-btn">Fetch Whatnot Orders</button> -->

        <!--
        <div id="token-container" style="display:none;">
          <div class="token-info"><strong>CSRF</strong><br /><span id="csrf-token">-</span></div>
          <div class="token-info"><strong>Session Extension Token</strong><br /><span id="session-token">-</span></div>
          <div class="token-info"><strong>Cookies Present</strong><br /><span id="cookie-status">-</span></div>
          <button id="copy-tokens" class="copy-btn">Copy Tokens</button>
        </div>

        <h4>API Demo</h4>
        <button id="demo-session" class="api-btn">GET Session API</button>
        <button id="demo-graphql" class="api-btn">POST GetSellerLiveReadiness</button>
        <input id="bio-input" class="input" type="text" placeholder="Enter bio text for user update..." />
        <button id="demo-update-bio" class="api-btn">POST UpdateProfileMutation</button>
        <textarea id="custom-payload" class="input" placeholder="Optional: paste exact GraphQL payload JSON from your platform"></textarea>
        <button id="demo-custom-post" class="api-btn">POST Custom GraphQL Payload</button>
        -->

        <div id="response" aria-live="polite"></div>

        <p class="footer-note">Open whatnot.com and stay logged in before connecting.</p>
      </main>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
